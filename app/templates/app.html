<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>
    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>  <!-- Import Socket.IO -->
</head>
<body>

<div class="tabs">
    <div class="tab" onclick="showTab('search')">search</div>
    <div class="tab" onclick="showTab('graph')">graph</div>
    <div class="tab" onclick="showTab('readexplore')">readexplore</div>
    <div class="tab" onclick="showTab('hilo')">hilo</div>
    <div class="tab" onclick="showTab('wordcloud')">wordcloud</div>
</div>


<!-- Tab Search Contents -->
<div class="tab-content" id="search" style="display:none;">
    <h1>{{ hugo }}</h1>
    
    <!-- Display search results if available -->
    {% if results %}
        <ul>
            {% for result in results %}
                <li>{{ result }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <!-- Search form -->
    <form id="searchForm">
        <input type="text" id="keyword" name="keyword" placeholder="Enter a word">
        <button type="submit">Search</button>
    </form>

    <div id="status"></div>  <!-- Status messages from WebSocket or Flask -->
    
    <script src="{{ url_for('static', filename='websocket.js') }}"></script>
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js"></script>-->
</div>


<!-- Tab Graph Contents -->
    <!--
    <iframe src="https://hugoverissimo21.github.io/InfoMosaic-sandbox/assets/graph_{{ g.search_query }}.html" frameborder="0">
        <p>Loading, please wait...</p>
    </iframe>
    -->

<div class="tab-content" id="graph" style="display:none;">
    <button onclick="loadGraph()">Load Graph</button>

    <iframe id="graphIframe" width="100%" height="500px" frameborder="0">
        <p>Loading, please wait...</p>
    </iframe>
</div>


<script src="{{ url_for('static', filename='showtab.js') }}"></script>
</body>
</html>
